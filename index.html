<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>BGMI Leaderboard</title><style>
body {
  margin: 0;
  background: #0f172a;
  text-align: center;
  font-family: Arial;
  color: white;
}

h1 {
  margin: 20px;
}

canvas {
  margin-top: 10px;
  border-radius: 10px;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}
</style></head><body><h1>🏆 Overall Standing</h1><canvas id="canvas" width="1080" height="1350"></canvas>
<br>
<button onclick="downloadImage()">Download Image</button>

<script>

// 🔗 PUT YOUR GOOGLE SHEET CSV LINK HERE
const sheetURL = "https://api.allorigins.win/raw?url=https://docs.google.com/spreadsheets/d/1gLTFVhdB88h4Muqh690Dy7U8sAyxQy-Cfz4fpUA1HlQ/edit?usp=drivesdk";

// 🖼 YOUR IMAGE NAME (upload in repo)
const bgImage = "https://cdn.discordapp.com/attachments/1491113430474686495/1491124004910792764/Screenshot_2026-04-07-22-39-02-347_com.instagram.android-edit.jpg?ex=69d68cf2&is=69d53b72&hm=8c6c98f538a6ab1cd1ee15dfa520e6b117bd72d8e4e8c7ebd7774871153cc3af&";

async function generateImage() {

  const res = await fetch(sheetURL + "&t=" + new Date().getTime());
  const text = await res.text();

  const rows = text.trim().split("\n").map(r => r.split(","));

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const bg = new Image();
  bg.src = bgImage;

  bg.onload = () => {

    // draw background
    ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

    // text style
    ctx.fillStyle = "#000000";
    ctx.font = "bold 28px Arial";

    // 🔥 COLUMN POSITIONS (MATCHED TO YOUR IMAGE)
    const x = {
      rank: 100,
      team: 180,
      played: 650,
      pp: 740,
      fp: 830,
      wwcd: 920,
      tp: 1010
    };

    let startY = 480;
    let gap = 45;

    // draw rows (TOP 20)
    rows.slice(1, 21).forEach((row, i) => {

      const y = startY + (i * gap);

      // rank
      ctx.fillText("#" + (i + 1), x.rank, y);

      // team name
      ctx.fillText(row[0] || "-", x.team, y);

      // stats
      ctx.fillText(row[1] || "-", x.played, y);
      ctx.fillText(row[2] || "-", x.pp, y);
      ctx.fillText(row[3] || "-", x.fp, y);
      ctx.fillText(row[4] || "-", x.wwcd, y);

      // highlight TOTAL (TP)
      ctx.fillStyle = "#14532d";
      ctx.fillText(row[5] || "-", x.tp, y);
      ctx.fillStyle = "#000000";

    });

  };
}

// download
function downloadImage() {
  const canvas = document.getElementById("canvas");
  const link = document.createElement("a");
  link.download = "leaderboard.png";
  link.href = canvas.toDataURL();
  link.click();
}

// run
generateImage();

// auto refresh every 10 sec
setInterval(generateImage, 10000);

</script></body>
</html>
